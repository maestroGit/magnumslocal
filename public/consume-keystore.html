<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consume (BURN) Keystore</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="stylesheet" type="text/css" href="header-custom.css">
  <link rel="stylesheet" href="transfer-keystore.css">
</head>
  <body>
  <!-- Cabecera de navegación a ancho completo (estilo BlocksWine) -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><img src="images/iconoBWred.png" alt="BlocksWine logo" class="logo-icon rotatable white">BlocksWine</h1>
      <button id="hamburger-menu-btn" class="btn" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" type="button" style="display:none;">
        <span style="font-size:0.5em;line-height:1;color:#fff !important;">☰</span>
      </button>
      <nav class="nav">
        <a class="btn" href="view.html"><span class="metric-value">Panel</span></a>
        <a class="btn" href="keystore.html"><span class="metric-value">Generar</span></a>
        <a class="btn" href="import-keystore.html"><span class="metric-value">Importar </span></a>
        <a class="btn" href="history-keystore.html"><span class="metric-value">History</span></a>
        <a class="btn active" href="consume-keystore.html"><span class="metric-value">Consume</span></a>
        <a class="btn" href="transfer-keystore.html"><span class="metric-value">Transferir</span></a>
      </nav>
      <script src="js/hamburger-menu.js"></script>
    </div>
  </header>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>🍷 Consume</h2>
      </div>
      <p>Selecciona el UTXO con tu Magnum y confirma con tu passphrase para recibirla 🚚.</p>
      <style>
        .utxo-row.pending { background: rgba(247,147,26,0.12); border: 1px dashed #f7931a; padding: 6px; border-radius: 6px; }
        .utxo-row.pending label { color: #f3b26f !important; }
        .utxo-row.pending .utxo-radio { pointer-events: none; }
        .utxo-badge { color: #f7931a; font-size: 0.85em; margin-left: 8px; }
      </style>
      <form id="burnForm" autocomplete="off">
        <!-- Lista de UTXOs renderizada por JS -->
        <!-- Aquí se insertará la lista de UTXOs por JS -->
        <div id="utxoList" style="margin:16px 0 0 0;"></div>
        <label for="burnPassphrase" style="margin-top:12px;display:block;">Passphrase del keystore:
          <input type="password" id="burnPassphrase" name="burnPassphrase" required autocomplete="new-password" />
        </label>
        <label for="burnReason" style="margin-top:12px;display:block;">Motivo de baja:
          <select id="burnReason" name="burnReason">
            <option value="burn" selected>Burn (baja definitiva)</option>
            <option value="bodega">Devolución a bodega</option>
          </select>
        </label>
        <div class="card-actions" style="margin-top:18px;display:flex;gap:12px;justify-content:flex-end;">
          <button type="submit" class="keystore-btn primary">Ejecutar Baja</button>
        </div>
      </form>
      <div id="burnStatus" class="keystore-status"></div>
    </div>
  </div>
  <script type="module" src="consume-keystore.js"></script>
</body>
</html>
