<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial Keystore</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="stylesheet" type="text/css" href="header-custom.css">
  <link rel="stylesheet" href="history-keystore.css">
</head>
  <body>
  <!-- Cabecera de navegación a ancho completo (estilo BlocksWine) -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><img src="images/iconoBWred.png" alt="BlocksWine logo" class="logo-icon rotatable white">BlocksWine</h1>
      <button id="hamburger-menu-btn" class="btn" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" type="button" style="display:none;">
        <span style="font-size:0.5em;line-height:1;color:#fff !important;">☰</span>
      </button>
      <nav class="nav">
        <a class="btn" href="view.html"><span class="metric-value">Panel</span></a>
        <a class="btn" href="keystore.html"><span class="metric-value">Create</span></a>
        <a class="btn" href="import-keystore.html"><span class="metric-value">Import </span></a>
        <a class="btn" href="consume-keystore.html"><span class="metric-value">Consume</span></a>
        <a class="btn" href="transfer-keystore.html"><span class="metric-value">Transfer</span></a>
        <a class="btn active" href="history-keystore.html"><span class="metric-value">History</span></a>
      </nav>
      <script src="js/hamburger-menu.js"></script>
    </div>
  </header>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>History</h2>
      </div>
      <p>Consulta el historial de transacciones de tu wallet importada.</p>
      <div class="filters" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;width:100%;margin:8px 0;">
        <div class="filter-group" style="display:flex;flex-direction:column;gap:2px;align-items:flex-start;min-width:120px;">
          <span style="color:#fff;">Estado:</span>
          <label style="color:#fff;display:flex;gap:6px;align-items:center;"><span>Pending</span><input type="checkbox" id="fStatusPending" checked></label>
          <label style="color:#fff;display:flex;gap:6px;align-items:center;"><span>Mined</span><input type="checkbox" id="fStatusMined" checked></label>
        </div>
        <div class="filter-group" style="display:flex;flex-direction:column;gap:2px;align-items:flex-start;min-width:120px;">
          <span style="color:#fff;">Tipo:</span>
          <label style="color:#fff;display:flex;gap:6px;align-items:center;"><span>Received</span><input type="checkbox" id="fTypeRecibido" checked></label>
          <label style="color:#fff;display:flex;gap:6px;align-items:center;"><span>Transfer</span><input type="checkbox" id="fTypeEnviado" checked></label>
          <label style="color:#fff;display:flex;gap:6px;align-items:center;"><span>Consumed</span><input type="checkbox" id="fTypeQuemada" checked></label>
          <label style="color:#fff;display:flex;gap:6px;align-items:center;"><span>Returned</span><input type="checkbox" id="fTypeDevuelta" checked></label>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <input id="fSearch" type="text" placeholder="Buscar por txId..." style="background:#2a1620;color:#fff;border:1px solid #f7931a;border-radius:6px;padding:6px 8px;min-width:200px;" />
        </div>
      </div>
      <div class="history-actions" style="display:flex;gap:8px;justify-content:flex-end;width:100%;">
        <button id="btnRefresh" class="keystore-btn">Refresh</button>
      </div>
      <div id="historyList" class="history-list" style="width:100%;margin-top:12px;"></div>
      <div class="card-actions" style="margin-top:12px;display:flex;gap:12px;justify-content:center;width:100%;">
        <button id="btnLoadMore" class="keystore-btn" disabled>Load more</button>
      </div>
      <div id="historyStatus" class="keystore-status"></div>
    </div>
  </div>
  <script type="module" src="history-keystore.js"></script>
</body>
</html>
