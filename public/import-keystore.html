<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Importar Keystore</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="stylesheet" type="text/css" href="header-custom.css">
  <link rel="stylesheet" href="import-keystore.css">
</head>
  <body>
  <!-- Cabecera de navegación a ancho completo (estilo BlocksWine) -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><img src="images/iconoBWred.png" alt="BlocksWine logo" class="logo-icon rotatable white">BlocksWine</h1>
      <button id="hamburger-menu-btn" class="btn" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" type="button" style="display:none;">
        <span style="font-size:0.5em;line-height:1;color:#fff !important;">☰</span>
      </button>
      <nav class="nav">
        <a class="btn" href="view.html"><span class="metric-value">Panel</span></a>
        <a class="btn" href="keystore.html"><span class="metric-value">Create</span></a>
        <a class="btn active" href="import-keystore.html"><span class="metric-value">Import</span></a>
      </nav>
      <script src="js/hamburger-menu.js"></script>
    </div>
  </header>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>🔑 Import Wallet</h2>
      </div>
      
      <form id="importForm" autocomplete="off">
        <label for="keystoreFile">Select wallet and enter passphrase
          <input type="file" id="keystoreFile" name="keystoreFile" accept="application/json" required />
        </label>
        <label for="importPassphrase" style="margin-top:12px;display:block;">Passphrase:
          <input type="password" id="importPassphrase" name="importPassphrase" required autocomplete="new-password" />
        </label>
        <div class="card-actions" style="margin-top:18px;display:flex;gap:12px;justify-content:flex-end;">
          <button type="submit" class="keystore-btn primary">Importar</button>
        </div>
      </form>
      <div id="importStatus" class="keystore-status"></div>
      <div id="importResult" style="display:none; margin-top:18px;">
        <div class="pubkey-info" style="margin-bottom:12px;">
          <span style="color:#f7931a;font-weight:600;">Public Key:</span>
          <span id="importedPubkey" style="word-break:break-all;color:#fff;"></span>
        </div>
        <div class="card-actions" style="display:flex;gap:12px;justify-content:flex-end;">
          <button id="btnConsume" class="keystore-btn">Consum</button>
          <button id="btnTransfer" class="keystore-btn">Transfer</button>
          <button id="btnHistory" class="keystore-btn">History</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="import-keystore.js"></script>
</body>
</html>
