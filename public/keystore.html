<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generar Keystore</title>

    <link rel="stylesheet" type="text/css" href="header-custom.css" />
    <link rel="stylesheet" href="keystore.css" />
  </head>
  <body>
    <!-- Cabecera de navegación a ancho completo (estilo BlocksWine) -->
    <header class="site-header">
      <div class="container">
        <h1 class="logo">
          <img
            src="images/iconoBWred.png"
            alt="BlocksWine logo"
            class="logo-icon rotatable white"
          />BlocksWine
        </h1>
        <button
          id="hamburger-menu-btn"
          class="btn"
          aria-label="Abrir menú"
          aria-haspopup="true"
          aria-expanded="false"
          type="button"
          style="display: none"
        >
          <span style="font-size: 0.5em; line-height: 1; color: #fff !important"
            >☰</span
          >
        </button>
        <nav class="nav">
          <a class="btn" href="view.html"
            ><span class="metric-value">Panel</span></a
          >
          <a class="btn" href="https://web-d5l049wewz07.up-de-fra1-k8s-1.apps.run-on-seenode.com/"
            ><span class="metric-value">Map</span></a
          >
          <a class="btn active" href="keystore.html"
            ><span class="metric-value">Create</span></a
          >
          <a class="btn" href="import-keystore.html"
            ><span class="metric-value">Import</span></a
          >
          <a class="btn" href="history-keystore.html"
            ><span class="metric-value">History</span></a
          >
          <a class="btn" href="consume-keystore.html"
            ><span class="metric-value">Opened</span></a
          >
          <a class="btn" href="transfer-keystore.html"
            ><span class="metric-value">Transfer</span></a
          >
          <button class="btn" id="go-bodega-wallet" type="button"><span class="metric-value">Winery</span></button>
        </nav>
        <script src="js/hamburger-menu.js"></script>
        <div id="auth-container" class="auth-header-container"></div>
      </div>
    </header>
    <div class="keystore-container">
      <div class="keystore-card">
        <div class="keystore-header">
          <h2>🔐 Cretate Wallet</h2>
        </div>
        <p>Create Wallet & download</p>
        <div class="keystore-actions">
          <button id="generateKeystore" class="keystore-btn primary">
            Create
          </button>
          <button id="downloadKeystore" class="keystore-btn" disabled>
            Download
          </button>
        </div>
        <div class="keystore-actions" style="margin-top: 10px; flex-direction: column; align-items: stretch; gap: 8px;">
          <input
            id="walletPublicKeyInput"
            type="text"
            placeholder="Public key (hex) para vincular/desvincular"
            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #c7c7c7;"
          />
          <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button id="linkWalletBtn" class="keystore-btn primary" type="button">Vincular wallet</button>
            <button id="unlinkWalletBtn" class="keystore-btn" type="button">Desvincular wallet</button>
          </div>
        </div>
        <div id="keystoreStatus" class="keystore-status"></div>
      </div>
    </div>

    <div id="passphraseModal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>Choose passphrase securely</h3>
        <form id="passphraseForm" autocomplete="off">
          <label for="passphraseInput"
            >Passphrase:
            <input
              type="password"
              id="passphraseInput"
              name="passphraseInput"
              required
              autocomplete="new-password"
            />
          </label>
          <div
            class="modal-actions"
            style="
              margin-top: 16px;
              display: flex;
              gap: 10px;
              justify-content: flex-end;
            "
          >
            <button
              type="submit"
              id="confirmPassphrase"
              class="keystore-btn primary"
            >
              Confirm
            </button>
            <button
              type="button"
              id="cancelPassphrase"
              class="keystore-btn primary"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module">
      const res = await fetch('/auth/user', { credentials: 'include' });
      if (!res.ok) {
        window.location.href = 'login.html';
      } else {
        const data = await res.json().catch(() => ({}));
        if (!data.user) {
          window.location.href = 'login.html';
        } else {
          const { AuthComponent } = await import('./js/auth-component.js');
          new AuthComponent('#auth-container');
        }
      }
    </script>
    <script type="module" src="keystore.js"></script>
    <script src="js/scrollFooter.js" defer></script>
  </body>
</html>
