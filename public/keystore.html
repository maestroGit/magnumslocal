<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generar Keystore</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="stylesheet" type="text/css" href="header-custom.css">
  <link rel="stylesheet" href="keystore.css">
</head>
  <body>
  <!-- Cabecera de navegación a ancho completo (estilo BlocksWine) -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><img src="images/iconoBWred.png" alt="BlocksWine logo" class="logo-icon rotatable white">BlocksWine</h1>
      <button id="hamburger-menu-btn" class="btn" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" type="button" style="display:none;">
        <span style="font-size:0.5em;line-height:1;color:#fff !important;">☰</span>
      </button>
      <nav class="nav">
        <a class="btn" href="view.html"><span class="metric-value">Panel</span></a>
        <a class="btn active" href="keystore.html"><span class="metric-value">Generar Keystore</span></a>
        <a class="btn" href="import-keystore.html"><span class="metric-value">Importar Keystore</span></a>
        <a class="btn" href="transfer-keystore.html"><span class="metric-value">Transferir</span></a>
      </nav>
      <script src="js/hamburger-menu.js"></script>
    </div>
  </header>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>🔐 Keystore Generator</h2>
      </div>
      <p>Genera y descarga tu archivo keystore seguro.</p>
      <div class="keystore-actions">
        <button id="generateKeystore" class="keystore-btn primary">Generar Keystore</button>
        <button id="downloadKeystore" class="keystore-btn" disabled>Descargar Keystore</button>
      </div>
      <div id="keystoreStatus" class="keystore-status"></div>
    </div>
  </div>

  <div id="passphraseModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Elige una contraseña segura</h3>
      <form id="passphraseForm" autocomplete="off">
        <label for="passphraseInput">Passphrase:
          <input type="password" id="passphraseInput" name="passphraseInput" required autocomplete="new-password" />
        </label>
        <div class="modal-actions" style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button type="submit" id="confirmPassphrase" class="keystore-btn primary">Confirmar</button>
          <button type="button" id="cancelPassphrase" class="keystore-btn">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="keystore.js"></script>
</body>
</html>
