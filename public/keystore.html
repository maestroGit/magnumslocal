<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generar Keystore</title>
  <link rel="stylesheet" href="keystore.css">
</head>
  <body>
  <header class="main-header">
    <div class="header-content">
      <span class="project-title">Magnum Wallet Demo</span>
      <nav class="main-nav">
        <a href="web-demo.html">Wallet</a>
        <a href="keystore.html" class="active">Generar Keystore</a>
        <a href="import-keystore.html">Importar Keystore</a>
        <a href="transfer-keystore.html">Transferir</a>
      </nav>
    </div>
  </header>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>🔐 Keystore Generator</h2>
      </div>
      <p>Genera y descarga tu archivo keystore seguro.</p>
      <div class="keystore-actions">
        <button id="generateKeystore" class="keystore-btn primary">Generar Keystore</button>
        <button id="downloadKeystore" class="keystore-btn" disabled>Descargar Keystore</button>
      </div>
      <div id="keystoreStatus" class="keystore-status"></div>
    </div>
  </div>

  <div id="passphraseModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Elige una contraseña segura</h3>
      <form id="passphraseForm" autocomplete="off">
        <label for="passphraseInput">Passphrase:
          <input type="password" id="passphraseInput" name="passphraseInput" required autocomplete="new-password" />
        </label>
        <div class="modal-actions" style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button type="submit" id="confirmPassphrase" class="keystore-btn primary">Confirmar</button>
          <button type="button" id="cancelPassphrase" class="keystore-btn">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="keystore.js"></script>
</body>
</html>
