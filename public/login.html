<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">
        <img src="images/iconoBWred.png" alt="BlocksWine icon" class="logo-icon rotatable white">
        BlocksWine
      </h1>
      <button id="hamburger-menu-btn" class="btn hide-hamburger" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" type="button">
        <span class="hamburger-icon">☰</span>
      </button>
      <nav class="nav">
        <a class="btn" href="view.html"><span class="metric-value">Panel</span></a>
        <a class="btn" href="https://web-d5l049wewz07.up-de-fra1-k8s-1.apps.run-on-seenode.com/" target="_blank" rel="noopener noreferrer"><span class="metric-value">Map</span></a>
        <a class="btn" href="keystore.html" target="_blank" rel="noopener noreferrer"><span class="metric-value">Wallet</span></a>
        <button class="btn" id="go-bodega-wallet" type="button"><span class="metric-value">Winery</span></button>
        <a class="btn active" href="login.html" id="login-btn"><span class="metric-value">Login</span></a>
        <a class="btn" href="register.html" id="register-nav-btn"><span class="metric-value">Registro</span></a>
      </nav>
      <script src="js/hamburger-menu.js"></script>
    </div>
  </header>
  <main class="login-main-centered">
    <div class="keystore-container login-keystore-container">
      <div class="keystore-card">
        <div class="keystore-header">
          <h2>🔑 Iniciar sesión</h2>
        </div>
        <form id="authForm" autocomplete="on" class="auth-form">
          <label for="auth-username">Usuario</label>
          <input type="text" id="auth-username" name="username" required autocomplete="username">
          <label for="auth-password">Contraseña</label>
          <input type="password" id="auth-password" name="password" required autocomplete="current-password">
          <button type="submit" class="keystore-btn primary">Iniciar sesión</button>
          <div id="auth-error" class="auth-error"></div>
        </form>
        <div class="google-login-container">
          <a href="/auth/google" id="googleLoginBtn" class="google-login-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo" class="google-logo">Iniciar sesión con Google
          </a>
        </div>

        <!-- Link a Registro -->
        <div class="login-register-link">
          ¿No tienes cuenta? <a href="register.html" class="link">Registrate aquí</a>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="js/mount-auth-component.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
