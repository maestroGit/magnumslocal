<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transferir Keystore</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="stylesheet" type="text/css" href="header-custom.css">
  <link rel="stylesheet" href="transfer-keystore.css">
</head>
  <body>
  <!-- Cabecera de navegación a ancho completo (estilo BlocksWine) -->
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><img src="images/iconoBWred.png" alt="BlocksWine logo" class="logo-icon rotatable white">BlocksWine</h1>
      <button id="hamburger-menu-btn" class="btn" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" type="button" style="display:none;">
        <span style="font-size:0.5em;line-height:1;color:#fff !important;">☰</span>
      </button>
      <nav class="nav">
        <a class="btn" href="view.html"><span class="metric-value">Panel</span></a>
        <a class="btn" href="keystore.html"><span class="metric-value">Generar Keystore</span></a>
        <a class="btn" href="import-keystore.html"><span class="metric-value">Importar Keystore</span></a>
        <a class="btn active" href="transfer-keystore.html"><span class="metric-value">Transferir</span></a>
      </nav>
      <script src="js/hamburger-menu.js"></script>
    </div>
  </header>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>💸 Transferir</h2>
      </div>
      <p>Envía fondos desde tu wallet importada.</p>
      <form id="transferForm" autocomplete="off">
        <label for="recipientAddress">Dirección de destino:
          <input type="text" id="recipientAddress" name="recipientAddress" required placeholder="0x..." />
        </label>
        <label for="transferAmount" style="margin-top:12px;display:block;">Cantidad:
          <input type="number" id="transferAmount" name="transferAmount" required min="1" step="any" />
        </label>
        <!-- Aquí se insertará la lista de UTXOs por JS -->
        <div id="utxoList" style="margin:16px 0 0 0;"></div>
        <div class="card-actions" style="margin-top:18px;display:flex;gap:12px;justify-content:flex-end;">
          <button type="submit" class="keystore-btn primary">Transferir</button>
        </div>
      </form>
      <div id="transferStatus" class="keystore-status"></div>
    </div>
  </div>
  <script type="module" src="transfer-keystore.js"></script>
</body>
</html>
