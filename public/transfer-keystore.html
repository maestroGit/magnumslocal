<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transferir Keystore</title>
  <link rel="stylesheet" href="transfer-keystore.css">
</head>
<body>
  <div class="keystore-container">
    <div class="keystore-card">
      <div class="keystore-header">
        <h2>💸 Transferir</h2>
      </div>
      <p>Envía fondos desde tu wallet importada.</p>
      <form id="transferForm" autocomplete="off">
        <label for="recipientAddress">Dirección de destino:
          <input type="text" id="recipientAddress" name="recipientAddress" required placeholder="0x..." />
        </label>
        <label for="transferAmount" style="margin-top:12px;display:block;">Cantidad:
          <input type="number" id="transferAmount" name="transferAmount" required min="1" step="any" />
        </label>
        <!-- Aquí se insertará la lista de UTXOs por JS -->
        <div id="utxoList" style="margin:16px 0 0 0;"></div>
        <div class="card-actions" style="margin-top:18px;display:flex;gap:12px;justify-content:flex-end;">
          <button type="submit" class="keystore-btn primary">Transferir</button>
        </div>
      </form>
      <div id="transferStatus" class="keystore-status"></div>
    </div>
  </div>
  <script type="module" src="transfer-keystore.js"></script>
</body>
</html>
